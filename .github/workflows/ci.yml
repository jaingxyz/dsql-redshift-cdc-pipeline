name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: Lint
        run: ruff check app/ --output-format=github

      - name: Format check
        run: ruff format --check app/

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - name: Run shellcheck
        # Ubuntu runners ship shellcheck preinstalled; pin to the runner's version.
        # SC1091 = "could not find sourced file" — _lib.sh is sourced at runtime,
        # not present at lint time. Suppressed at the directive level.
        run: |
          shellcheck --version
          shellcheck -e SC1091 infra/scripts/*.sh

  cfn:
    name: cfn-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install cfn-lint
        # 1.51+ knows AWS::DSQL::Cluster. Older versions (e.g. 1.21) error
        # with E3006 "Resource type does not exist". Don't downgrade.
        run: pip install cfn-lint==1.51.2

      - name: Lint CloudFormation template
        run: cfn-lint infra/cloudformation.yaml
