name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    name: SAST scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0

      - name: Run Semgrep CI
        run: |
          semgrep ci \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/cloudformation \
            --config p/bash
