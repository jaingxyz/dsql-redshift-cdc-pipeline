version: 2
updates:
  # Python runtime + dev deps for the order simulator.
  # Lambda function uses only boto3 (bundled in Lambda runtime — not pinned here).
  - package-ecosystem: pip
    directory: "/app"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions versions (we pin to commit SHAs; Dependabot bumps the SHA
  # comments in lockstep with the tag's underlying commit).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
