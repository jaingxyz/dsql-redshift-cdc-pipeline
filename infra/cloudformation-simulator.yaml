AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Always-on order simulator for the DSQL -> Redshift CDC pipeline. Deploys an
  ECR repository, a minimal VPC with public subnets, an ECS Fargate cluster,
  and a single long-running task that runs order_simulator.py at the configured
  rate against the DSQL cluster from the base stack.

  Also provisions an AWS Budget at the configured monthly threshold so the
  account owner has a passive cost signal while playing with the data.

  WHY a separate template? Keeps the core pipeline (cloudformation.yaml)
  reproducible and free of long-running compute. Deploy this only when you
  want a forever-running data source.

  WHY public subnets, no NAT? A NAT gateway is ~$32/mo per AZ and dwarfs the
  cost of the simulator itself. The container only makes outbound calls
  (to DSQL endpoint, AWS APIs); the security group blocks all inbound.
  Net: comparable security to a private+NAT setup at ~zero infrastructure cost.

  Imports from the base stack ({ProjectName}-stack):
    DSQL cluster identifier, region.

Parameters:
  ProjectName:
    Type: String
    Default: dsql-cdc
    Description: >
      Must match the ProjectName used to deploy the base stack. Exports
      from the base stack are namespaced as PROJECT-foo and this template
      Fn::ImportValue's them by that pattern.
    AllowedPattern: "^[a-z][a-z0-9-]{2,30}$"

  ImageRepositoryName:
    Type: String
    Default: dsql-cdc-simulator
    Description: ECR repository name for the simulator container image.

  ImageTag:
    Type: String
    Default: latest
    Description: ECR image tag to run.

  TargetRate:
    Type: Number
    Default: 1
    Description: Orders per second to simulate. 1 TPS keeps DSQL/Redshift active without hammering them.
    MinValue: 0.1
    MaxValue: 100

  MonthlyBudgetUsd:
    Type: Number
    Default: 200
    Description: AWS Budget threshold in USD for the account where this stack is deployed.
    MinValue: 10

  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024"]
    Description: Fargate task CPU units (256 = 0.25 vCPU; smallest valid).

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048"]
    Description: Fargate task memory MiB (must be valid pair with TaskCpu).

Resources:

  # =========================================================================
  # ECR private repository for the simulator image.
  # ImageScanningConfiguration: scan on push so the dashboard surfaces any
  # CVEs in our base image without us having to schedule scans.
  # LifecyclePolicy: keep last 5 images, drop older ones. Stops the repo
  # growing unbounded as you iterate on the simulator.
  # =========================================================================
  SimulatorEcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ImageRepositoryName
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EmptyOnDelete: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 5 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 5
              },
              "action": { "type": "expire" }
            }]
          }

  # =========================================================================
  # Minimal VPC: 1 VPC, 2 public subnets across 2 AZs, IGW, public route.
  # No private subnets, no NAT — see top-of-file rationale.
  # =========================================================================
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-sim-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-sim-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.0.0/20
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-sim-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.42.16.0/20
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-sim-public-b"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  # =========================================================================
  # Security group: outbound only. Blocks all inbound, which is appropriate
  # for a simulator that only ever calls out to DSQL/AWS APIs. The default
  # SG behavior is "all egress allowed", which is what we want.
  # =========================================================================
  SimulatorSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} simulator (egress only)"
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound (DSQL, AWS APIs over public internet)

  # =========================================================================
  # ECS cluster (Fargate-only). Enable container insights for free metrics
  # in CloudWatch — useful when you eventually wonder why a simulator task
  # restarted.
  # =========================================================================
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-sim-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # =========================================================================
  # IAM roles
  #   - ExecutionRole: ECS agent uses this to pull the image from ECR and
  #     write logs to CloudWatch. Standard managed policy.
  #   - TaskRole: the container's identity at runtime. Needs:
  #       dsql:DbConnectAdmin to mint short-lived auth tokens,
  #       dsql:GetCluster as a sanity-check used by some boto3 paths.
  # =========================================================================
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-sim-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-sim-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DsqlConnect
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # generate_db_connect_admin_auth_token (which the simulator
              # calls) maps to dsql:DbConnectAdmin. We scope to the
              # specific cluster ARN imported from the base stack.
              - Effect: Allow
                Action:
                  - dsql:DbConnectAdmin
                Resource:
                  Fn::ImportValue: !Sub "${ProjectName}-dsql-cluster-arn"

  TaskLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectName}-sim"
      RetentionInDays: 14

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-sim"
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: ARM64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: simulator
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ImageRepositoryName}:${ImageTag}"
          Essential: true
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: DSQL_CLUSTER_ID
              Value:
                Fn::ImportValue: !Sub "${ProjectName}-dsql-cluster-id"
          # Override the image CMD so we can change rate via the stack
          # parameter without rebuilding the image.
          Command:
            - python
            - order_simulator.py
            - --duration
            - "0"
            - --rate
            - !Sub "${TargetRate}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref TaskLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: simulator

  # =========================================================================
  # ECS service: desired count 1, restart-on-failure (Fargate replaces
  # stopped tasks automatically when DesiredCount > 0). assignPublicIp is
  # required because we put the task in a public subnet without a NAT.
  # =========================================================================
  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - PublicRoute
    Properties:
      ServiceName: !Sub "${ProjectName}-sim-service"
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref SimulatorSg
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB

  # =========================================================================
  # Cost guardrail: monthly budget. NotificationsWithSubscribers omitted
  # per user choice — you'll watch the budget tab in the console manually.
  # =========================================================================
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "${ProjectName}-monthly"
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetUsd
          Unit: USD

Outputs:
  EcrRepositoryUri:
    Description: ECR repository URI to docker push to
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ImageRepositoryName}"
    Export:
      Name: !Sub "${ProjectName}-sim-ecr-uri"

  EcsClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster
    Export:
      Name: !Sub "${ProjectName}-sim-cluster"

  ServiceName:
    Description: ECS service name
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub "${ProjectName}-sim-service"

  LogGroupName:
    Description: CloudWatch Logs group with simulator output
    Value: !Ref TaskLogGroup
    Export:
      Name: !Sub "${ProjectName}-sim-log-group"
